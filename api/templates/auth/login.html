{% extends 'base.html' %}
{% block title %}התחברות — MARAMARA{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-card">
    <h1 class="auth-card__title">ברוך שובך</h1>
    <p class="auth-card__subtitle">התחבר כדי לראות את המראה שלך</p>

    <form id="loginForm" class="form" novalidate>
      <label class="form__field">
        <span class="form__label">אימייל</span>
        <input type="email" name="email" required autocomplete="email" class="form__input" />
      </label>

      <label class="form__field">
        <span class="form__label">סיסמה</span>
        <input type="password" name="password" required autocomplete="current-password" minlength="8" class="form__input" />
      </label>

      <div id="loginError" class="form__error" hidden></div>

      <button type="submit" class="btn btn--primary btn--block">התחברות</button>
    </form>

    <p class="auth-card__footer">
      עדיין אין לך חשבון?
      <a href="{{ url_for('auth.signup_page') }}">הירשם כאן</a>
    </p>
  </div>
</section>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('loginError');
  err.hidden = true;
  const fd = new FormData(e.target);
  const body = { email: fd.get('email'), password: fd.get('password') };
  try {
    const res = await fetch('/auth/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      credentials: 'include',
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error?.message || 'שגיאה');
    window.location = '/';
  } catch (ex) {
    err.textContent = ex.message;
    err.hidden = false;
  }
});
</script>
{% endblock %}
