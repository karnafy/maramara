{% extends 'base.html' %}
{% block title %}ציר זמן — MARAMARA{% endblock %}

{% block content %}
<section class="dashboard">
  <header class="dashboard__header">
    <h1>ציר הזמן הרגשי שלך</h1>
    <div class="dashboard__controls">
      <input type="date" id="dateInput" class="form__input" />
    </div>
  </header>

  <div class="timeline-container">
    <canvas id="timelineChart" width="900" height="320" aria-label="Emotional timeline"></canvas>
  </div>

  <section class="timeline-legend">
    <div><span class="dot dot--positive"></span> חיובי</div>
    <div><span class="dot dot--neutral"></span> ניטרלי</div>
    <div><span class="dot dot--negative"></span> שלילי</div>
    <div><span class="dot dot--trigger"></span> טריגר</div>
    <div><span class="dot dot--calming"></span> הרגעה</div>
  </section>
</section>

<script>
const dateInput = document.getElementById('dateInput');
dateInput.value = new Date().toISOString().slice(0, 10);

async function loadTimeline(date) {
  const res = await fetch(`/dashboard/api/timeline?date=${date}`, { credentials: 'include' });
  const { data } = await res.json();
  drawTimeline(data || []);
}

function drawTimeline(segments) {
  const canvas = document.getElementById('timelineChart');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const padding = 40;
  const w = canvas.width - padding * 2;
  const h = canvas.height - padding * 2;
  ctx.strokeStyle = '#cbd5e1';
  ctx.strokeRect(padding, padding, w, h);

  if (!segments.length) {
    ctx.fillStyle = '#94a3b8';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('אין נתונים לתאריך הנבחר', canvas.width / 2, canvas.height / 2);
    return;
  }

  const colorMap = { positive: '#10b981', neutral: '#64748b', negative: '#ef4444', mixed: '#f59e0b' };

  segments.forEach(s => {
    const hour = new Date(s.created_at).getHours() + new Date(s.created_at).getMinutes() / 60;
    const x = padding + (hour / 24) * w;
    const y = padding + h - (s.intensity_score / 10) * h;
    ctx.fillStyle = colorMap[s.polarity] || '#64748b';
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fill();
    if (s.trigger_detected) {
      ctx.strokeStyle = '#ef4444';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x, y, 9, 0, Math.PI * 2);
      ctx.stroke();
    }
    if (s.calming_detected) {
      ctx.strokeStyle = '#10b981';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x, y, 9, 0, Math.PI * 2);
      ctx.stroke();
    }
  });
}

dateInput.addEventListener('change', () => loadTimeline(dateInput.value));
loadTimeline(dateInput.value);
</script>
{% endblock %}
