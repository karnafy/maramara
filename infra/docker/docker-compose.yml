# =========================================================
# MARAMARA - Local dev stack
# Run:   docker compose -f infra/docker/docker-compose.yml up
# =========================================================
version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: maramara-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../../api
      dockerfile: Dockerfile
    container_name: maramara-api
    env_file:
      - ../../.env
    environment:
      REDIS_URL: redis://redis:6379/0
      PORT: "5000"
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../../api:/app  # hot-reload in dev
    command: flask --app app run --host 0.0.0.0 --port 5000 --debug

  worker:
    build:
      context: ../../api
      dockerfile: Dockerfile.worker
    container_name: maramara-worker
    env_file:
      - ../../.env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../../api:/app
    deploy:
      replicas: 1

volumes:
  redis_data:
